<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Lane of IRC</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #1a1a1a;
      --border:    #2e2e2e;
      --accent:    #00c853;
      --accent2:   #69f0ae;
      --text:      #e0e0e0;
      --muted:     #777;
      --nick:      #64b5f6;
      --error:     #ef5350;
      --font-mono: 'Cascadia Code', 'Fira Mono', 'Consolas', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    header h1 {
      color: var(--accent);
      font-size: 1.2rem;
      letter-spacing: 0.05em;
      flex: 1;
    }

    header h1 span { color: var(--muted); }

    /* ── Token input ───────────────────────────────────────────── */
    #token-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #token-bar label { color: var(--muted); font-size: 0.8rem; }

    #token-input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.3rem 0.6rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      width: 220px;
      border-radius: 3px;
    }

    #token-input:focus { outline: 1px solid var(--accent); }

    /* ── Layout ────────────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ───────────────────────────────────────────────── */
    #sidebar {
      width: 220px;
      min-width: 180px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #sidebar h2 {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.8rem 1rem 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    #channel-list { list-style: none; flex: 1; overflow-y: auto; }

    #channel-list li {
      cursor: pointer;
      padding: 0.55rem 1rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    #channel-list li:hover { background: #232323; }
    #channel-list li.active { background: #1e3a2a; color: var(--accent2); }

    .ch-name { color: var(--accent); font-weight: bold; }
    .ch-net  { color: var(--muted); font-size: 0.75rem; }

    /* ── Search bar ────────────────────────────────────────────── */
    #search-bar {
      padding: 0.6rem 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.4rem;
    }

    #search-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.3rem 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      border-radius: 3px;
    }

    #search-input:focus { outline: 1px solid var(--accent); }

    #search-btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      border-radius: 3px;
      font-weight: bold;
    }

    #search-btn:hover { background: var(--accent2); }

    /* ── Main content ──────────────────────────────────────────── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    #content-header {
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.6rem;
    }

    #content-header h2 { color: var(--accent); font-size: 1rem; }
    #content-header .subtitle { color: var(--muted); font-size: 0.8rem; }

    /* ── Messages ──────────────────────────────────────────────── */
    .message {
      display: flex;
      gap: 0.8rem;
      padding: 0.35rem 0;
      border-bottom: 1px solid #1e1e1e;
      align-items: baseline;
    }

    .msg-time  { color: var(--muted); font-size: 0.75rem; min-width: 160px; }
    .msg-nick  { color: var(--nick); min-width: 120px; text-align: right; }
    .msg-text  { color: var(--text); flex: 1; word-break: break-word; }

    /* search result extra channel badge */
    .msg-channel { color: var(--accent); font-size: 0.75rem; min-width: 140px; }

    /* ── Status / error ────────────────────────────────────────── */
    .status-msg {
      color: var(--muted);
      font-style: italic;
      padding: 1rem 0;
    }

    .error-msg {
      color: var(--error);
      padding: 0.5rem 0.8rem;
      border: 1px solid var(--error);
      border-radius: 3px;
      font-size: 0.85rem;
    }

    /* ── Spinner ───────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Memory Lane of <span>//</span> IRC</h1>
  <div id="token-bar">
    <label for="token-input">API token:</label>
    <input id="token-input" type="password" placeholder="(leave blank if none)" autocomplete="off" />
  </div>
</header>

<div class="layout">

  <!-- Sidebar: channel list + search -->
  <aside id="sidebar">
    <h2>Channels</h2>
    <ul id="channel-list">
      <li class="status-msg" style="padding:.6rem 1rem">
        <span class="spinner"></span> Loading…
      </li>
    </ul>
    <div id="search-bar">
      <input id="search-input" type="text" placeholder="Search messages…" />
      <button id="search-btn">Go</button>
    </div>
  </aside>

  <!-- Main content area -->
  <main id="main">
    <div class="status-msg">Select a channel from the sidebar, or use the search box.</div>
  </main>

</div>

<script>
  'use strict';

  // ── Helpers ──────────────────────────────────────────────────────────────

  function getToken() {
    return document.getElementById('token-input').value.trim();
  }

  function apiFetch(path) {
    const token = getToken();
    const headers = token ? { Authorization: `Bearer ${token}` } : {};
    return fetch(path, { headers });
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
  }

  function renderError(msg) {
    return `<div class="error-msg">⚠ ${msg}</div>`;
  }

  // ── Channel list ─────────────────────────────────────────────────────────

  async function loadChannels() {
    const list = document.getElementById('channel-list');
    try {
      const res = await apiFetch('/api/channels');
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        list.innerHTML = `<li>${renderError(err.error || res.statusText)}</li>`;
        return;
      }
      const channels = await res.json();
      if (!channels.length) {
        list.innerHTML = '<li class="status-msg" style="padding:.6rem 1rem">No channels found.</li>';
        return;
      }
      list.innerHTML = channels.map(ch => `
        <li data-id="${ch.id}" title="${ch.description || ''}">
          <div class="ch-name">${ch.name}</div>
          <div class="ch-net">${ch.network} · ${ch.messageCount} msg${ch.messageCount !== 1 ? 's' : ''}</div>
        </li>
      `).join('');

      list.querySelectorAll('li').forEach(li => {
        li.addEventListener('click', () => {
          list.querySelectorAll('li').forEach(x => x.classList.remove('active'));
          li.classList.add('active');
          loadMessages(li.dataset.id);
        });
      });
    } catch (e) {
      list.innerHTML = `<li>${renderError(e.message)}</li>`;
    }
  }

  // ── Messages ─────────────────────────────────────────────────────────────

  async function loadMessages(channelId) {
    const main = document.getElementById('main');
    main.innerHTML = '<div class="status-msg"><span class="spinner"></span> Loading messages…</div>';
    try {
      const res = await apiFetch(`/api/channels/${encodeURIComponent(channelId)}/messages`);
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        main.innerHTML = renderError(err.error || res.statusText);
        return;
      }
      const { channel, messages } = await res.json();
      const header = `
        <div id="content-header">
          <h2>${channel.name}</h2>
          <span class="subtitle">${channel.network} — ${channel.description || ''}</span>
        </div>`;

      if (!messages.length) {
        main.innerHTML = header + '<div class="status-msg">No messages in this channel.</div>';
        return;
      }

      const rows = messages.map(m => `
        <div class="message">
          <span class="msg-time">${formatDate(m.timestamp)}</span>
          <span class="msg-nick">&lt;${m.nick}&gt;</span>
          <span class="msg-text">${escapeHtml(m.text)}</span>
        </div>`).join('');

      main.innerHTML = header + rows;
    } catch (e) {
      main.innerHTML = renderError(e.message);
    }
  }

  // ── Search ───────────────────────────────────────────────────────────────

  async function runSearch(query) {
    const main = document.getElementById('main');
    main.innerHTML = '<div class="status-msg"><span class="spinner"></span> Searching…</div>';

    // Deselect sidebar channel
    document.querySelectorAll('#channel-list li').forEach(x => x.classList.remove('active'));

    try {
      const res = await apiFetch(`/api/search?q=${encodeURIComponent(query)}`);
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        main.innerHTML = renderError(err.error || res.statusText);
        return;
      }
      const { count, results } = await res.json();
      const header = `
        <div id="content-header">
          <h2>Search results for "${escapeHtml(query)}"</h2>
          <span class="subtitle">${count} match${count !== 1 ? 'es' : ''}</span>
        </div>`;

      if (!results.length) {
        main.innerHTML = header + '<div class="status-msg">No results found.</div>';
        return;
      }

      const rows = results.map(m => `
        <div class="message">
          <span class="msg-time">${formatDate(m.timestamp)}</span>
          <span class="msg-channel">${m.channel ? m.channel.name : m.channelId}</span>
          <span class="msg-nick">&lt;${m.nick}&gt;</span>
          <span class="msg-text">${escapeHtml(m.text)}</span>
        </div>`).join('');

      main.innerHTML = header + rows;
    } catch (e) {
      main.innerHTML = renderError(e.message);
    }
  }

  // ── Utility ──────────────────────────────────────────────────────────────

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Bootstrap ────────────────────────────────────────────────────────────

  document.getElementById('token-input').addEventListener('change', loadChannels);

  document.getElementById('search-btn').addEventListener('click', () => {
    const q = document.getElementById('search-input').value.trim();
    if (q) runSearch(q);
  });

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const q = e.target.value.trim();
      if (q) runSearch(q);
    }
  });

  // Load channels on page load
  loadChannels();
</script>
</body>
</html>
